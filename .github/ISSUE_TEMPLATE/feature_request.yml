name: Feature request
description: Suggest an idea for Glimpse
title: "[Feature Request] "
labels: ["enhancement"]
body:
  - type: textarea
    id: request
    attributes:
      label: What would you like Glimpse to do?
      description: Describe the feature or change you want.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why would this be useful?
      description: What problem does it solve, or what workflow would it improve?

  - type: dropdown
    id: local-first
    attributes:
      label: Would this need cloud processing?
      description: Glimpse prioritizes local-first processing.
      options:
        - "Unsure"
        - "No, it can run fully locally"
        - "Yes, it likely needs cloud processing"

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Examples, screenshots, links, or extra context.
