name: Feature request
description: Suggest an idea for Glimpse
title: "[Feature Request] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.

  - type: dropdown
    id: local-first
    attributes:
      label: Does this feature require cloud processing?
      description: Glimpse prioritizes local-first processing.
      options:
        - "No — can run fully locally"
        - "Yes — requires cloud"
        - "Unsure"
    validations:
      required: true

  - type: textarea
    id: local-examples
    attributes:
      label: Local-first examples (if applicable)
      description: Are there existing open-source examples of this working locally? If so, link them here.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
