name: Bug report
description: Create a report to help us improve Glimpse
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or videos
      description: If applicable, add screenshots to help explain your problem. You can take a screenshot with `Shift+Cmd+4` on macOS.

  - type: input
    id: glimpse-version
    attributes:
      label: Glimpse version
      placeholder: "e.g. 0.5.2"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS Sequoia 15.1"
    validations:
      required: true

  - type: dropdown
    id: transcription-mode
    attributes:
      label: Transcription mode
      options:
        - Local
        - Cloud
    validations:
      required: true

  - type: dropdown
    id: recording-mode
    attributes:
      label: Recording mode
      options:
        - Smart
        - Hold
        - Toggle
    validations:
      required: true

  - type: input
    id: local-model
    attributes:
      label: Local model (if applicable)
      description: Only fill in if using local transcription mode.
      placeholder: "e.g. Whisper Large"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
