name: Bug report
description: Create a report to help us improve Glimpse
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How to reproduce
      description: If you can, tell us what you were doing when it happened.
      placeholder: |
        1. ...
        2. ...
        3. ...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?

  - type: textarea
    id: setup
    attributes:
      label: Setup
      description: Optional, but helpful if the bug depends on your system or settings.
      placeholder: |
        Glimpse version:
        macOS version:
        Recording mode / model:

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Screenshots, videos, logs, or any extra context.
