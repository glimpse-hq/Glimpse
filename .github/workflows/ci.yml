# PR gate on GitHub-hosted runners: fast feedback before merge.
# Native macOS/Windows validation runs on Blacksmith after merge (platform.yml).

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: verify app versions match
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(awk -F'"' '
            /^\[package\]$/ { in_package = 1; next }
            /^\[/ { in_package = 0 }
            in_package && /^version = / { print $2; exit }
          ' src-tauri/Cargo.toml)
          if [[ -z "$VERSION" ]]; then
            echo "Failed to resolve app version from src-tauri/Cargo.toml" >&2
            exit 1
          fi
          PKG_VERSION=$(jq -r .version package.json)
          if [[ "$PKG_VERSION" != "$VERSION" ]]; then
            echo "Version mismatch: src-tauri/Cargo.toml=$VERSION package.json=$PKG_VERSION" >&2
            exit 1
          fi

      - name: setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: install frontend dependencies
        run: bun ci

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: check formatting
        run: bun run format:check

      - name: lint
        run: bun run lint:ci

      - name: build frontend
        run: bun run build

      - name: check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

  audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri
