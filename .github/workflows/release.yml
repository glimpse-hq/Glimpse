name: "publish"

on:
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    permissions:
      contents: write

    runs-on: blacksmith-2vcpu-ubuntu-2404

    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.release-type.outputs.version }}
      prerelease: ${{ steps.release-type.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v5

      - name: determine release type
        id: release-type
        shell: bash
        run: |
          VERSION=$(awk -F'"' '
            /^\[package\]$/ { in_package = 1; next }
            /^\[/ { in_package = 0 }
            in_package && /^version = / { print $2; exit }
          ' src-tauri/Cargo.toml)
          if [[ -z "$VERSION" ]]; then
            echo "Failed to resolve app version from src-tauri/Cargo.toml" >&2
            exit 1
          fi
          PKG_VERSION=$(jq -r .version package.json)
          if [[ "$PKG_VERSION" != "$VERSION" ]]; then
            echo "Version mismatch: src-tauri/Cargo.toml=$VERSION package.json=$PKG_VERSION" >&2
            exit 1
          fi
          if [[ "$VERSION" =~ -rc\.[0-9]+$ ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: create draft release
        id: create-release
        uses: actions/github-script@v9
        with:
          script: |
            const tag = `v${{ steps.release-type.outputs.version }}`;
            const release = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Glimpse ${tag}`,
              body: "See the assets to download this version and install.",
              draft: true,
              prerelease: ${{ steps.release-type.outputs.prerelease }},
            };

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: release.owner,
                repo: release.repo,
                tag,
              });
              return data.id;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const { data } = await github.rest.repos.createRelease(release);
            return data.id;

  publish-tauri:
    permissions:
      contents: write
    needs: create-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: blacksmith-6vcpu-macos-15
            os: macos
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
            cargo-cache-dir: src-tauri/target
          - platform: blacksmith-4vcpu-windows-2025
            os: windows
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""
            cargo-cache-dir: C:\t

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: verify Xcode
        if: matrix.os == 'macos'
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
        run: xcodebuild -version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: install LLVM
        if: matrix.os == 'windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20.1.8"
          directory: ${{ runner.temp }}/llvm

      - name: configure Windows build paths
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $cargoTargetDir = "C:\t"
          $libclangPath = Join-Path $env:RUNNER_TEMP "llvm\bin"
          New-Item -ItemType Directory -Force $cargoTargetDir | Out-Null
          "CARGO_TARGET_DIR=$cargoTargetDir" >> $env:GITHUB_ENV
          "LIBCLANG_PATH=$libclangPath" >> $env:GITHUB_ENV

      - name: install Vulkan SDK
        if: matrix.os == 'windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun
            ~/Library/Caches/bun
            ~\AppData\Local\bun\install\cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: cache rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}
          workspaces: src-tauri -> target
          cache-directories: ${{ matrix.cargo-cache-dir }}
          cache-on-failure: true

      - name: install frontend dependencies
        run: bun ci

      - name: import Apple Developer Certificate
        if: matrix.os == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: verify certificate
        if: matrix.os == 'macos'
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate imported."

      - name: build and publish macOS
        if: matrix.os == 'macos'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          MACOSX_DEPLOYMENT_TARGET: "14.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "14.0"
          DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
          # Apple Clang still defines __ARM_FEATURE_MATMUL_INT8 for ggml's +noi8mm build,
          # which makes whisper-rs-sys compile the wrong ARM path on GitHub's arm64 runner.
          CFLAGS_aarch64_apple_darwin: "-U__ARM_FEATURE_MATMUL_INT8"
          CXXFLAGS_aarch64_apple_darwin: "-U__ARM_FEATURE_MATMUL_INT8"
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          VITE_GLIMPSE_PERSONAL_CHECKOUT_URL: ${{ secrets.VITE_GLIMPSE_PERSONAL_CHECKOUT_URL }}
          VITE_GLIMPSE_COMMERCIAL_CHECKOUT_URL: ${{ secrets.VITE_GLIMPSE_COMMERCIAL_CHECKOUT_URL }}
          VITE_GLIMPSE_FOUNDER_CHECKOUT_URL: ${{ secrets.VITE_GLIMPSE_FOUNDER_CHECKOUT_URL }}
          VITE_GLIMPSE_CUSTOMER_PORTAL: ${{ secrets.VITE_GLIMPSE_CUSTOMER_PORTAL }}
          GLIMPSE_POLAR_BENEFIT_PERSONAL: ${{ secrets.GLIMPSE_POLAR_BENEFIT_PERSONAL }}
          GLIMPSE_POLAR_BENEFIT_COMMERCIAL: ${{ secrets.GLIMPSE_POLAR_BENEFIT_COMMERCIAL }}
          GLIMPSE_POLAR_BENEFIT_FOUNDER: ${{ secrets.GLIMPSE_POLAR_BENEFIT_FOUNDER }}
          GLIMPSE_POLAR_BENEFIT_CONTRIBUTOR: ${{ secrets.GLIMPSE_POLAR_BENEFIT_CONTRIBUTOR }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          tagName: v__VERSION__
          releaseName: "Glimpse v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: ${{ needs.create-release.outputs.prerelease == 'true' }}
          includeUpdaterJson: false
          args: ${{ matrix.tauri-args }}

      - name: build and publish Windows
        if: matrix.os == 'windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          VITE_GLIMPSE_PERSONAL_CHECKOUT_URL: ${{ secrets.VITE_GLIMPSE_PERSONAL_CHECKOUT_URL }}
          VITE_GLIMPSE_COMMERCIAL_CHECKOUT_URL: ${{ secrets.VITE_GLIMPSE_COMMERCIAL_CHECKOUT_URL }}
          VITE_GLIMPSE_FOUNDER_CHECKOUT_URL: ${{ secrets.VITE_GLIMPSE_FOUNDER_CHECKOUT_URL }}
          VITE_GLIMPSE_CUSTOMER_PORTAL: ${{ secrets.VITE_GLIMPSE_CUSTOMER_PORTAL }}
          GLIMPSE_POLAR_BENEFIT_PERSONAL: ${{ secrets.GLIMPSE_POLAR_BENEFIT_PERSONAL }}
          GLIMPSE_POLAR_BENEFIT_COMMERCIAL: ${{ secrets.GLIMPSE_POLAR_BENEFIT_COMMERCIAL }}
          GLIMPSE_POLAR_BENEFIT_FOUNDER: ${{ secrets.GLIMPSE_POLAR_BENEFIT_FOUNDER }}
          GLIMPSE_POLAR_BENEFIT_CONTRIBUTOR: ${{ secrets.GLIMPSE_POLAR_BENEFIT_CONTRIBUTOR }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          tagName: v__VERSION__
          releaseName: "Glimpse v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: ${{ needs.create-release.outputs.prerelease == 'true' }}
          includeUpdaterJson: false
          args: ${{ matrix.tauri-args }}

  publish-updater-json:
    permissions:
      contents: write
    needs:
      - create-release
      - publish-tauri

    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: publish combined updater JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: v${{ needs.create-release.outputs.version }}
          VERSION: ${{ needs.create-release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          assets_json=$(gh release view "$TAG_NAME" --json assets)

          mac_asset=$(jq -r '.assets[].name | select(endswith(".app.tar.gz"))' <<< "$assets_json" | head -n 1)
          mac_sig="${mac_asset}.sig"
          windows_asset=$(jq -r '.assets[].name | select(endswith(".exe"))' <<< "$assets_json" | head -n 1)
          if [[ -z "$windows_asset" ]]; then
            windows_asset=$(jq -r '.assets[].name | select(endswith(".msi"))' <<< "$assets_json" | head -n 1)
          fi
          windows_sig="${windows_asset}.sig"

          for asset in "$mac_asset" "$mac_sig" "$windows_asset" "$windows_sig"; do
            if [[ -z "$asset" || "$asset" == "null" ]]; then
              echo "Missing updater asset: $asset" >&2
              jq -r '.assets[].name' <<< "$assets_json" >&2
              exit 1
            fi
          done

          workdir=$(mktemp -d)
          gh release download "$TAG_NAME" --pattern "$mac_sig" --pattern "$windows_sig" --dir "$workdir"

          mac_signature=$(<"$workdir/$mac_sig")
          windows_signature=$(<"$workdir/$windows_sig")
          mac_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${mac_asset}"
          windows_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${windows_asset}"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the assets to download this version and install." \
            --arg pub_date "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg mac_signature "$mac_signature" \
            --arg mac_url "$mac_url" \
            --arg windows_signature "$windows_signature" \
            --arg windows_url "$windows_url" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $mac_signature, url: $mac_url },
                "darwin-x86_64": { signature: $mac_signature, url: $mac_url },
                "darwin-aarch64-app": { signature: $mac_signature, url: $mac_url },
                "darwin-x86_64-app": { signature: $mac_signature, url: $mac_url },
                "windows-x86_64": { signature: $windows_signature, url: $windows_url }
              }
            }' > latest.json

          gh release upload "$TAG_NAME" latest.json --clobber
